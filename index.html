<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة مهامي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 مهامي اليومية</h1>
        <p class="subtitle">نظم يومك بأناقة</p>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="اكتب المهمة هنا...">
                <select id="categorySelect">
                    <option value="work">💼 عمل</option>
                    <option value="personal">🏠 شخصي</option>
                    <option value="study">📚 دراسة</option>
                    <option value="health">💪 صحة</option>
                </select>
                <input type="date" id="dateInput">
            </div>
            <button onclick="addTask()">➕ إضافة مهمة</button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">الكل</button>
            <button class="filter-btn" onclick="filterTasks('work')">💼 عمل</button>
            <button class="filter-btn" onclick="filterTasks('personal')">🏠 شخصي</button>
            <button class="filter-btn" onclick="filterTasks('study')">📚 دراسة</button>
            <button class="filter-btn" onclick="filterTasks('health')">💪 صحة</button>
        </div>
        
        <ul id="taskList"></ul>
        
        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>لا توجد مهام حالياً</p>
            <p>أضف مهمتك الأولى أعلاه!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
